
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmark - iOS Style</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #1d1d1f;
            --accent-color: #007aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --blur: 25px;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --glass-bg: rgba(28, 28, 30, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --card-bg: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1); }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 850;
            letter-spacing: -1.5px;
            background: linear-gradient(45deg, #FF3B30, #FF9500, #FFCC00, #4CD964, #5AC8FA, #007AFF, #5856D6, #FF2D55);
            background-size: 400% 400%;
            animation: gradientText 10s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
        }

        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .icon-btn:hover { transform: scale(1.1); background: var(--accent-color); color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }

        .action-bar {
            display: flex; gap: 12px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border);
        }
        .action-bar .spacer { flex-grow: 1; }

        .category { margin-bottom: 45px; }
        .category-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-left: 10px; }
        .category-header h2 { margin: 0; font-size: 24px; font-weight: 600; opacity: 0.9; }

        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 25px;
            min-height: 100px; /* 确保空分类也能接收拖拽 */
        }

        .bookmark-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            position: relative;
            padding: 15px 10px;
            border-radius: 26px;
            background: transparent;
            user-select: none; /* 防止拖拽时选中文字 */
        }

        .bookmark-card:hover { background: var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        /* 拖拽动画效果 */
        .bookmark-card.dragging {
            opacity: 0.4;
            transform: scale(0.9);
        }
        .bookmark-card.drag-over {
            border: 2px dashed var(--accent-color);
            background: var(--glass-bg);
            transform: scale(1.05);
        }

        .icon-wrapper {
            width: 82px; height: 82px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; pointer-events: none;
        }
        .icon-wrapper img { width: 52px; height: 52px; object-fit: contain; pointer-events: none; }

        .bookmark-name { font-size: 13px; font-weight: 500; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }

        .edit-tag {
            position: absolute; top: 5px; right: 5px; background: #ff3b30; color: white; width: 24px; height: 24px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(255, 59, 48, 0.4); z-index: 10;
        }
        .edit-tag svg { width: 14px; height: 14px; stroke: white; stroke-width: 2.5; }
        .locked .edit-tag, .locked .cat-edit { display: none !important; }
        
        .cat-edit { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.4; background: var(--card-bg); }
        .cat-edit svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }
        .cat-edit:hover { opacity: 1; background: var(--accent-color); color: white; }
        .cat-edit.delete:hover { background: #ff3b30; }

        .icon-btn::after {
            content: attr(data-title); position: absolute; bottom: -35px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .icon-btn:hover::after { opacity: 1; bottom: -40px; }

    </style>
</head>
<body>

    <div class="container" id="app">
        <header>
            <h1>My Bookmarks</h1>
            <div class="toolbar">
                <button class="icon-btn" onclick="setTheme('dark')" data-title="深色模式"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                <button class="icon-btn" onclick="setTheme('light')" data-title="浅色模式"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
            </div>
        </header>

        <div class="action-bar">
            <button class="icon-btn" onclick="toggleLock()" id="lockBtn" data-title="解锁编辑">
                <svg id="lockIcon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </button>
            <button class="icon-btn" onclick="addCategory()" data-title="新建分类项目"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg></button>
            <button class="icon-btn" onclick="addBookmark()" data-title="添加新书签"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path><line x1="12" y1="7" x2="12" y2="13"></line><line x1="9" y1="10" x2="15" y2="10"></line></svg></button>
            <div class="spacer"></div>
            <button class="icon-btn" onclick="saveData()" data-title="保存更改到本地" style="background: var(--accent-color); color: white; border: none;">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            </button>
        </div>

        <main id="content"></main>
    </div>

    <script>
        const defaultData = [
            { id: 'cat_1', name: '搜索', bookmarks: [{ id: 'bm_1', url: 'bing.com', name: 'Bing' }] },
            { id: 'cat_2', name: '购物', bookmarks: [{ id: 'bm_2', url: 'taobao.com', name: '淘宝' }] }
        ];

        let bookmarksData = JSON.parse(localStorage.getItem('ios_bookmarks_v4')) || defaultData;
        let isLocked = true;
        let draggedItemInfo = null;

        const iconLockStr = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>';
        const iconUnlockStr = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path>';

        function render() {
            const content = document.getElementById('content');
            content.innerHTML = '';
            document.getElementById('app').className = `container ${isLocked ? 'locked' : ''}`;
            
            const lockBtn = document.getElementById('lockBtn');
            const lockIcon = document.getElementById('lockIcon');
            lockIcon.innerHTML = isLocked ? iconLockStr : iconUnlockStr;
            lockBtn.setAttribute('data-title', isLocked ? '点击解锁编辑排版' : '锁定编辑');
            lockBtn.style.color = isLocked ? 'var(--text-color)' : '#ff3b30';

            bookmarksData.forEach(cat => {
                const catSection = document.createElement('section');
                catSection.className = 'category';
                
                const bookmarksHtml = cat.bookmarks.map(bm => `
                    <div class="bookmark-card" 
                         draggable="${!isLocked}" 
                         ondragstart="handleDragStart(event, '${cat.id}', '${bm.id}')"
                         ondragend="handleDragEnd(event)"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, '${cat.id}', '${bm.id}')"
                         onclick="return handleCardClick(event, '${bm.url}')">
                        <div class="edit-tag" onclick="deleteBookmark(event, '${cat.id}', '${bm.id}')">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </div>
                        <div class="icon-wrapper">
                            <img src="https://favicon.splitbee.io/?url=${bm.url}" onerror="this.src='https://www.google.com/s2/favicons?domain=${bm.url}&sz=128'">
                        </div>
                        <div class="bookmark-name">${bm.name || bm.url}</div>
                    </div>
                `).join('');

                catSection.innerHTML = `
                    <div class="category-header">
                        <h2>${cat.name}</h2>
                        <div class="cat-edit" onclick="renameCategory('${cat.id}')">
                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </div>
                        <div class="cat-edit delete" onclick="deleteCategory('${cat.id}')">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </div>
                    </div>
                    <div class="bookmark-grid" 
                         ondragover="handleGridDragOver(event)" 
                         ondrop="handleGridDrop(event, '${cat.id}')">
                        ${bookmarksHtml}
                    </div>
                `;
                content.appendChild(catSection);
            });

            if(!isLocked) document.querySelectorAll('.edit-tag').forEach(el => el.style.display = 'flex');
        }

        // --- 拖拽排序核心逻辑 ---
        function handleDragStart(e, catId, bmId) {
            if(isLocked) return e.preventDefault();
            draggedItemInfo = { catId, bmId };
            setTimeout(() => e.target.classList.add('dragging'), 0);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedItemInfo = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            const card = e.currentTarget;
            if(!card.classList.contains('dragging')) card.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, targetCatId, targetBmId) {
            e.preventDefault();
            e.stopPropagation(); // 防止冒泡到 Grid 的 Drop 事件
            if(!draggedItemInfo) return;

            const { catId: sourceCatId, bmId: sourceBmId } = draggedItemInfo;
            if(sourceCatId === targetCatId && sourceBmId === targetBmId) return;

            const sourceCat = bookmarksData.find(c => c.id === sourceCatId);
            const targetCat = bookmarksData.find(c => c.id === targetCatId);
            const sourceIndex = sourceCat.bookmarks.findIndex(b => b.id === sourceBmId);
            const targetIndex = targetCat.bookmarks.findIndex(b => b.id === targetBmId);

            const [draggedItem] = sourceCat.bookmarks.splice(sourceIndex, 1);
            targetCat.bookmarks.splice(targetIndex, 0, draggedItem);

            render();
            // saveData(); // 取消注释可实现拖拽后立即自动保存
        }

        function handleGridDragOver(e) { e.preventDefault(); }
        
        function handleGridDrop(e, targetCatId) {
            e.preventDefault();
            if(!draggedItemInfo) return;
            const sourceCat = bookmarksData.find(c => c.id === draggedItemInfo.catId);
            const targetCat = bookmarksData.find(c => c.id === targetCatId);
            const sourceIndex = sourceCat.bookmarks.findIndex(b => b.id === draggedItemInfo.bmId);
            
            const [draggedItem] = sourceCat.bookmarks.splice(sourceIndex, 1);
            targetCat.bookmarks.push(draggedItem);
            render();
        }

        function handleCardClick(e, url) {
            if(!isLocked) {
                e.preventDefault(); // 解锁状态下阻止跳转，方便拖动
                return false;
            }
            window.open(url.startsWith('http') ? url : 'https://' + url, '_blank');
        }
        // -------------------------

        function setTheme(theme) {
            if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.removeAttribute('data-theme');
        }

        function toggleLock() { isLocked = !isLocked; render(); }

        function saveData() {
            localStorage.setItem('ios_bookmarks_v4', JSON.stringify(bookmarksData));
            alert('所有更改及排版已保存！');
            if(!isLocked) toggleLock();
        }

        function addCategory() {
            if(isLocked) return alert('请先点击 🔒 解锁编辑！');
            const name = prompt('请输入新分类的名称：');
            if (name) { bookmarksData.push({ id: 'cat_' + Date.now(), name: name, bookmarks: [] }); render(); }
        }

        function renameCategory(catId) {
            const cat = bookmarksData.find(c => c.id === catId);
            const newName = prompt('修改项目名称：', cat.name);
            if(newName) { cat.name = newName; render(); }
        }

        function deleteCategory(catId) {
            if(confirm('确定要彻底删除该项目吗？')) { bookmarksData = bookmarksData.filter(c => c.id !== catId); render(); }
        }

        function addBookmark() {
            if(isLocked) return alert('请先点击 🔒 解锁编辑！');
            if(bookmarksData.length === 0) return alert("请先新建一个项目分类");
            let list = bookmarksData.map((c, i) => `${i+1}. ${c.name}`).join('\n');
            let idx = prompt(`请选择要添加到的项目序号：\n${list}`, "1");
            let cat = bookmarksData[parseInt(idx)-1];
            if(cat) {
                const url = prompt('输入网址 (例: apple.com)：');
                const name = prompt('输入书签名称 (例: Apple)：');
                if(url) { cat.bookmarks.push({ id: 'bm_'+Date.now(), url, name: name || url }); render(); }
            }
        }

        function deleteBookmark(e, catId, bmId) {
            e.stopPropagation();
            const cat = bookmarksData.find(c => c.id === catId);
            cat.bookmarks = cat.bookmarks.filter(b => b.id !== bmId);
            render();
        }

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
        render();
    </script>
</body>
</html>
